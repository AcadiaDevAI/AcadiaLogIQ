

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: acadialogiq-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - STORAGE_TYPE=local
      - LOCAL_STORAGE_PATH=/app/uploads
      - UPLOAD_DIR=/app/uploads
      - PYTHONUNBUFFERED=1
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_CLERK_PUBLISHABLE_KEY: ${REACT_APP_CLERK_PUBLISHABLE_KEY:-}
    container_name: acadialogiq-ui
    ports:
      - "8501:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads: